{% extends "app_layout.html" %}
{% block title %}Search — Spotilist{% endblock %}

{% block main_content %}
<div class="p-8">
  <h1 class="text-3xl font-black mb-6">Search</h1>

  <div class="relative mb-8">
    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-sp-muted pointer-events-none"
         fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <input id="search-input" type="text" placeholder="Search albums and tracks..."
           autofocus
           class="w-full max-w-xl bg-sp-dark border border-sp-subtle rounded-full
                  pl-12 pr-5 py-3 text-sm focus:outline-none focus:border-sp-green
                  placeholder-sp-subtle transition-colors">
  </div>

  <div id="results-container"></div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
  let searchTimeout = null;
  let results = { albums: { items: [] }, tracks: { items: [] } };

  document.getElementById('search-input').addEventListener('input', function () {
    clearTimeout(searchTimeout);
    const q = this.value.trim();
    if (!q) {
      document.getElementById('results-container').innerHTML = '';
      return;
    }
    searchTimeout = setTimeout(() => performSearch(q), 400);
  });

  async function performSearch(q) {
    const container = document.getElementById('results-container');
    container.innerHTML = '<p class="text-sp-muted">Searching...</p>';
    try {
      const resp = await fetch(`/api/spotify/search?q=${encodeURIComponent(q)}&types=album,track`);
      if (!resp.ok) {
        container.innerHTML = `<p class="text-red-400">Request failed (${resp.status}). Try refreshing the page.</p>`;
        return;
      }
      results = await resp.json();
      if (results.error) {
        container.innerHTML = `<p class="text-red-400">Spotify error: ${escH(results.error.message)}</p>`;
        return;
      }
      renderResults();
    } catch (e) {
      container.innerHTML = `<p class="text-red-400">Error: ${escH(e.message)}</p>`;
    }
  }

  function renderResults() {
    const container = document.getElementById('results-container');
    const albums = results.albums?.items || [];
    const tracks = results.tracks?.items || [];
    let html = '';

    if (albums.length) {
      html += `<h2 class="text-xl font-bold mb-4">Albums</h2>
               <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-10">`;
      albums.forEach((album, i) => {
        const img    = album.images?.[0]?.url || '';
        const artist = (album.artists || []).map(a => a.name).join(', ');
        html += `<div class="bg-sp-dark rounded-xl p-4 hover:bg-sp-card transition-colors cursor-pointer group"
                      onclick="openAlbum(${i})">
                   ${img ? `<img src="${escH(img)}" alt="${escH(album.name)}" class="w-full aspect-square object-cover rounded-lg mb-3">` :
                           `<div class="w-full aspect-square bg-sp-card rounded-lg mb-3"></div>`}
                   <p class="text-sm font-medium truncate" title="${escH(album.name)}">${escH(album.name)}</p>
                   <p class="text-xs text-sp-muted truncate">${escH(artist)}</p>
                   <button class="mt-2 w-full bg-sp-green text-black text-xs font-bold py-1.5 rounded-full
                                  opacity-0 group-hover:opacity-100 transition-opacity">
                     Add to Library
                   </button>
                 </div>`;
      });
      html += '</div>';
    }

    if (tracks.length) {
      html += `<h2 class="text-xl font-bold mb-4">Tracks</h2>
               <div class="space-y-1.5 max-w-2xl">`;
      tracks.forEach((track, i) => {
        const img    = track.album?.images?.[0]?.url || '';
        const artist = (track.artists || []).map(a => a.name).join(', ');
        const dur    = fmtDur(track.duration_ms);
        html += `<div class="flex items-center gap-4 p-3 bg-sp-dark rounded-lg hover:bg-sp-card
                             transition-colors cursor-pointer group" onclick="openTrack(${i})">
                   <span class="text-sp-muted w-5 text-right text-sm flex-shrink-0">${i + 1}</span>
                   ${img ? `<img src="${escH(img)}" alt="" class="w-10 h-10 rounded object-cover flex-shrink-0">` :
                           `<div class="w-10 h-10 rounded bg-sp-card flex-shrink-0"></div>`}
                   <div class="flex-1 min-w-0">
                     <p class="text-sm font-medium truncate">${escH(track.name)}</p>
                     <p class="text-xs text-sp-muted truncate">${escH(artist)}</p>
                   </div>
                   <span class="text-sp-muted text-xs flex-shrink-0">${dur}</span>
                   <button class="bg-sp-green text-black text-xs font-bold px-3 py-1 rounded-full
                                  opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                     Add
                   </button>
                 </div>`;
      });
      html += '</div>';
    }

    if (!albums.length && !tracks.length) {
      html = '<p class="text-sp-muted">No results found.</p>';
    }
    container.innerHTML = html;
  }

  function openAlbum(i) {
    const a = results.albums.items[i];
    const artist = (a.artists || []).map(x => x.name).join(', ');
    openModal(a.id, 'album', a.name, artist,
              a.images?.[0]?.url || '', a.external_urls?.spotify || '',
              a.release_date || '', null, null, a.tracks?.total || null);
  }

  function openTrack(i) {
    const t = results.tracks.items[i];
    const artist = (t.artists || []).map(x => x.name).join(', ');
    openModal(t.id, 'track', t.name, artist,
              t.album?.images?.[0]?.url || '', t.external_urls?.spotify || '',
              t.album?.release_date || '', t.duration_ms || null, null);
  }

  function fmtDur(ms) {
    if (!ms) return '';
    return `${Math.floor(ms / 60000)}:${String(Math.floor((ms % 60000) / 1000)).padStart(2, '0')}`;
  }
</script>
{% endblock %}
